<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행운 추첨</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

h1 {
  margin-bottom: 10px;
  text-align: center;
  font-size: 30px;
}

h2
{
  font-size: 60px;
}

#result {
  font-size: 40px;
  margin: 40px 0;
  font-weight: bold;
  transition: 0.3s;
}

.win1 { color: gold; }
.win2 { color: #60a5fa; }
.win3 { color: #34d399; }
.lose { color: #9ca3af; }

button {
  font-size: 22px;
  padding: 18px 35px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  margin: 5px;
}

.draw-btn {
  background: #1d4ed8;
  color: white;
}

.reset-btn {
  position: fixed;
  top: 15px;
  right: 15px;

  background: rgba(220, 38, 38, 0.7);
  color: white;

  font-size: 12px;
  padding: 8px 12px;
  border-radius: 8px;

  opacity: 0.6;
  transition: 0.2s;
}

.reset-btn:hover {
  opacity: 1;
}

button:active {
  transform: scale(0.95);
}

#remain {
  margin-top: 30px;
  font-size: 16px;
  color: #cbd5f5;
}
</style>
</head>

<body>
  <button class="reset-btn" onclick="resetDraw()">리셋</button>
<h1>🎯 필코리아테크놀로지 🎉</h1>
<h2>대한진단검사의학회 2026년 춘계심포지엄 (KSLM2026) 추첨 이벤트</h2>

<div id="result">버튼을 눌러주세요</div>

<div>
  <button class="draw-btn" onclick="draw()">뽑기</button>
</div>

<div id="remain"></div>

<script>
let pool;

function createPool() {
  return [
    ...Array(1).fill("1등"),
    ...Array(5).fill("2등"),
    ...Array(12).fill("3등"),
    ...Array(82).fill("꽝")
  ];
}

function init() {
  const saved = localStorage.getItem("drawPool");

  if (saved) {
    pool = JSON.parse(saved);
  } else {
    pool = createPool();
    shuffle(pool);
    save();
  }

  updateRemain();
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function save() {
  localStorage.setItem("drawPool", JSON.stringify(pool));
}

function draw() {
  if (pool.length === 0) {
    document.getElementById("result").innerText = "종료";
    return;
  }

  const resultEl = document.getElementById("result");
  resultEl.className = "";
  resultEl.innerText = "추첨 중...";

  setTimeout(() => {
    const result = pool.pop();
    save();

    resultEl.innerText = result;

    if (result === "1등") resultEl.classList.add("win1");
    else if (result === "2등") resultEl.classList.add("win2");
    else if (result === "3등") resultEl.classList.add("win3");
    else resultEl.classList.add("lose");

    updateRemain();
  }, 700);
}

function resetDraw() {
  const confirmReset = confirm("정말 초기화할까요?\n모든 기록이 삭제됩니다.");

  if (!confirmReset) return;

  pool = createPool();
  shuffle(pool);
  save();

  document.getElementById("result").innerText = "초기화 완료!";
  document.getElementById("result").className = "";

  updateRemain();
}

function updateRemain() {
  const counts = {
    "1등": 0,
    "2등": 0,
    "3등": 0,
    "꽝": 0
  };

  pool.forEach(p => counts[p]++);

  document.getElementById("remain").innerHTML = `
    남은 수량<br>
    1등: ${counts["1등"]} / 
    2등: ${counts["2등"]} / 
    3등: ${counts["3등"]} / 
    꽝: ${counts["꽝"]} <br>
    총 ${pool.length}개 남음
  `;
}

init();
</script>

</body>
</html>
